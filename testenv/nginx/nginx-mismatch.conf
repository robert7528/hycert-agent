# HandshakeFailure scenario: nginx starts normally with matching cert/key,
# but requires a client certificate for mTLS. Go's default TLS client does
# not present a client cert, so nginx aborts the handshake with alert 40.
#
# Originally this config mounted mismatched cert/key (cert-a + key-b),
# but modern nginx (1.25+) validates the pair at startup and refuses to
# launch — port becomes closed → ConnRefused, not HandshakeFailure.
# Using mTLS requirement is a more reliable way to force a mid-handshake
# rejection that classifies as HandshakeFailure.
server {
    listen 443 ssl;
    server_name test-a.local _;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    ssl_verify_client on;
    ssl_client_certificate /etc/nginx/ssl/ca.pem;

    location / {
        default_type text/plain;
        return 200 "should never reach here — client cert required\n";
    }
}
