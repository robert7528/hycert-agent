# HandshakeFailure scenario: cert and key are intentionally mismatched
# (Makefile mounts cert-a.pem + key-b.pem). nginx may refuse to start
# with this config (newer versions validate cert/key pair at startup);
# if it does start, TLS handshakes against this port fail with alert 40.
server {
    listen 443 ssl;
    server_name test-a.local _;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    location / {
        default_type text/plain;
        return 200 "nginx-mismatch (unreachable if TLS handshake fails)\n";
    }
}
