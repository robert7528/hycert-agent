# HandshakeFailure scenario: nginx starts normally with matching cert/key,
# but requires a client certificate via mTLS. Go's default TLS client
# does not present a client cert, so the server aborts mid-handshake.
#
# Two subtleties that drove this config:
#
# 1. Modern nginx (1.25+) validates ssl_certificate / ssl_certificate_key
#    match at startup — any mismatched pair causes the container to exit,
#    port becomes closed, probe gets ConnRefused (not HandshakeFailure).
#    So we mount matching cert-a/key-a and force the failure via
#    client-cert requirement instead.
#
# 2. TLS 1.3 moves client auth to POST-handshake, so a Go TLS client's
#    HandshakeContext() can return success with the server cert already
#    read BEFORE nginx rejects for missing client cert. That flips the
#    outcome to Mismatch instead of HandshakeFailure. Pinning TLS 1.2
#    keeps client auth inside the initial handshake so the rejection
#    surfaces as a handshake error where classify() expects it.
server {
    listen 443 ssl;
    server_name test-a.local _;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # Pin TLS 1.2 so client-cert challenge happens inside the handshake.
    ssl_protocols TLSv1.2;

    ssl_verify_client on;
    ssl_client_certificate /etc/nginx/ssl/ca.pem;

    location / {
        default_type text/plain;
        return 200 "should never reach here — client cert required\n";
    }
}
